name: Build and Release Android App

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    if: github.event_name == 'workflow_dispatch' || github.event.head_commit.message == 'RELEASE'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Cache Gradle Wrapper and Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('catch.txt') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Expo Prebuild
        run: bun x expo prebuild --platform android --clean

      - name: Grant Execute Permission for Gradlew
        run: chmod +x android/gradlew

      - name: Build Android Release
        working-directory: android
        run: NODE_ENV=production ./gradlew assembleRelease

      - name: List Build Outputs
        run: ls -R android/app/build/outputs/apk/release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: android/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
