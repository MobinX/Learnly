name: Build and Release Android App

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    if: github.event_name == 'workflow_dispatch' || github.event.head_commit.message == 'RELEASE'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Cache Gradle Wrapper and Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('catch.txt') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android Gradle
        uses: actions/cache@v4
        with:
          path: .gradle/android/.gradle
          key: android-gradle-${{ hashFiles('catch2.txt') }}
          restore-keys: |
            android-gradle-

      - name: Run Expo Prebuild
        run: bun x expo prebuild --platform android

      - name: Restore Android Gradle Cache
        run: |
          if [ -d ".gradle/android/.gradle" ]; then
            echo "Restoring .gradle/android/.gradle to android/.gradle"
            rm -rf android/.gradle
            mkdir -p android/.gradle
            cp -r .gradle/android/.gradle/. android/.gradle/
          else
            echo "No cache found at .gradle/android/.gradle"
          fi

      - name: Setup Android Signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          # Decode Keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          
          # Patch Gradle files
          bun scripts/patch-android-signing.js

      - name: Grant Execute Permission for Gradlew
        run: chmod +x android/gradlew

      - name: Build Android Release
        working-directory: android
        run: NODE_ENV=production ./gradlew assembleRelease

      - name: Save Android Gradle Cache
        if: always()
        run: |
          if [ -d "android/.gradle" ]; then
            echo "Saving android/.gradle to .gradle/android/.gradle"
            rm -rf .gradle/android/.gradle
            mkdir -p .gradle/android/.gradle
            cp -r android/.gradle/. .gradle/android/.gradle/
          else
            echo "android/.gradle not found, skipping cache save"
          fi

      - name: List Build Outputs
        run: ls -R android/app/build/outputs/apk/release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: android/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
